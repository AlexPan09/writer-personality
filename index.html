<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XZTI写作者量表测试</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div class="start-page" id="startPage">
            <h1>写作者量表测试</h1>
            <p class="subtitle">XZTI</p>
            <p>一款专为写作者设计的性格测试<br>请根据你的真实想法选择答案<br>共21道题，预计用时3-5分钟</p>
            <div class="info">
                <p>个人制作，非常粗糙。</p>
                <p>测试结果仅供娱乐，切勿深究。</p>
                <p>非官方，不权威，无科学依据，三无产品。</p>
            </div>
            <p class="ai-declaration">AI声明：文字内容为活人构思及手敲。网页代码由AI生成。</p>
            <button class="btn" onclick="startQuiz()">开始测试</button>
            <p class="credits">制作人：今朝，AlexPan<br>联系邮箱：XZTICZ@163.com</p>
        </div>

        <!-- 答题页面 -->
        <div class="quiz-page" id="quizPage">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-header">
                <span class="question-number" id="questionNumber">1 / 20</span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="navigation">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">上一题</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
            </div>
        </div>

        <!-- 结果页面 -->
        <div class="result-page" id="resultPage">
            <h2 id="resultTitle">你的写作人格特点为</h2>
            
            <!-- 人格图片区域 -->
            <div class="personality-image-container">
                <img id="personalityImage" src="" alt="人格形象" class="personality-image">
                <div id="personalityName" class="personality-name"></div>
            </div>
            
            <!-- 人格描述区域 -->
            <div id="descriptionSection" class="section-box">
                <div class="section-title">人格描述</div>
                <div id="personalityDescription" class="personality-description"></div>
            </div>

            <!-- 进度条区域（非隐藏结局时显示） -->
            <div id="dimensionsSection" class="section-box">
                <div class="section-title">写作维度</div>
                <div id="resultContainer"></div>
            </div>

            <!-- 结果解析区域 -->
            <div id="analysisSection" class="section-box">
                <div class="section-title">结果解析</div>
                <div id="personalityAnalysis" class="personality-analysis"></div>
            </div>

            <div id="dimensionAnalysisSection" class="section-box">
                <div class="section-title">维度解析</div>
                <div id="dimensionAnalysisContent" class="personality-analysis dimension-analysis"></div>
            </div>
            
            <!-- 隐藏人格区域 -->
            <div id="hiddenPersonalitySection" class="hidden-personality-section">
                <p class="hidden-personality-label">另外……</p>
                <p class="hidden-personality-title">你目前的隐藏人格为</p>
                <div class="personality-image-container">
                    <img id="hiddenPersonalityImage" src="" alt="隐藏人格形象" class="personality-image">
                    <div id="hiddenPersonalityName" class="personality-name"></div>
                </div>
                <div id="hiddenDescSection" class="section-box">
                    <div class="section-title">人格描述</div>
                    <div id="hiddenPersonalityDescription" class="personality-description"></div>
                </div>

                <!-- 进度条区域（隐藏结局时显示） -->
                <div id="hiddenDimensionsSection" class="section-box">
                    <div class="section-title">写作维度</div>
                    <div id="hiddenResultContainer"></div>
                </div>

                <!-- 隐藏人格结果解析区域 -->
                <div id="hiddenAnalysisSection" class="section-box">
                    <div class="section-title">结果解析</div>
                    <div id="hiddenPersonalityAnalysis" class="personality-analysis"></div>
                </div>

                <div id="hiddenDimensionAnalysisSection" class="section-box">
                    <div class="section-title">维度解析</div>
                    <div id="hiddenDimensionAnalysisContent" class="personality-analysis dimension-analysis"></div>
                </div>
            </div>
            
            <button class="btn restart-btn" onclick="restartQuiz()">重新测试</button>
            <button class="btn btn-secondary save-btn" id="saveBtn" onclick="saveResultImage()">保存图片</button>
            <div class="save-area" id="saveArea">
                <img id="saveImage" class="save-image" alt="长按保存测试结果">
                <span id="saveHint">图片生成中...</span>
            </div>
        </div>
    </div>

    <!-- 图片预览弹窗 -->
    <div class="image-modal" id="imageModal">
        <div class="image-modal-content">
            <div class="image-modal-header">
                <span class="image-modal-title">长按图片保存</span>
                <button class="image-modal-close" onclick="closeImageModal()">✕</button>
            </div>
            <div class="image-modal-body">
                <img id="resultImage" src="" alt="测试结果">
            </div>
            <p class="image-modal-tip">长按图片即可保存到相册</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./js/vendor/qrcode-generator.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
